<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0a0a0a; color: #e5e5e5;
    display: flex; flex-direction: column; height: 100vh;
  }
  .messages {
    flex: 1; overflow-y: auto; padding: 16px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }
  .msg {
    max-width: 80%; padding: 10px 14px; border-radius: 12px;
    font-size: 14px; line-height: 1.5; word-wrap: break-word;
  }
  .msg.agent {
    align-self: flex-start; background: #1a1a1a;
    border: 1px solid #2a2a2a; border-bottom-left-radius: 4px;
  }
  .msg.user {
    align-self: flex-end; background: #2a2a5a;
    border: 1px solid #3a3a6a; border-bottom-right-radius: 4px;
  }
  .msg-time {
    font-size: 10px; color: #555; margin-top: 4px;
  }
  .input-area {
    padding: 12px 16px; border-top: 1px solid #1a1a1a;
    display: flex; gap: 8px; background: #0a0a0a;
  }
  .input-area input {
    flex: 1; background: #111; border: 1px solid #2a2a2a;
    border-radius: 10px; padding: 10px 14px; color: #e5e5e5;
    font-size: 14px; outline: none; transition: border-color 0.15s;
  }
  .input-area input:focus { border-color: #818cf8; }
  .input-area input::placeholder { color: #555; }
  .input-area button {
    background: #818cf8; border: none; border-radius: 10px;
    padding: 0 16px; color: #fff; font-size: 14px; font-weight: 500;
    cursor: pointer; transition: background 0.15s; white-space: nowrap;
  }
  .input-area button:hover { background: #6366f1; }
  .input-area button:disabled { opacity: 0.4; cursor: default; }
  .empty {
    flex: 1; display: flex; align-items: center; justify-content: center;
    color: #444; font-size: 14px;
  }
</style>
</head>
<body>
<div class="messages" id="messages">
  <div class="empty" id="empty">Commencez la conversation...</div>
</div>
<div class="input-area">
  <input type="text" id="input" placeholder="Votre message..." autocomplete="off">
  <button id="send">Envoyer</button>
</div>

<script>
const messagesEl = document.getElementById('messages');
const emptyEl = document.getElementById('empty');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send');

let allMessages = [];

function init() {
  sendBtn.onclick = sendMessage;
  inputEl.onkeydown = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } };

  window.addEventListener('message', (e) => {
    if (e.data?.type === 'message') {
      addMessage(e.data.text, e.data.role || 'agent');
    }
    if (e.data?.type === 'messages') {
      allMessages = [];
      messagesEl.innerHTML = '';
      (e.data.messages || []).forEach(m => addMessage(m.text, m.role, m.timestamp));
    }
  });

  window.parent?.postMessage({ type: 'ready', widget: 'chat' }, '*');
}

function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;
  inputEl.value = '';
  addMessage(text, 'user');
  window.parent?.postMessage({ type: 'user_message', text }, '*');
}

function addMessage(text, role, timestamp) {
  if (emptyEl) emptyEl.remove();
  const ts = timestamp || new Date().toISOString();
  const time = ts.includes('T') ? ts.slice(11, 16) : '';
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `${esc(text)}<div class="msg-time">${time}</div>`;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  allMessages.push({ text, role, timestamp: ts });
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

init();
</script>
</body>
</html>
